<!DOCTYPE html>
        <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no' />
            <title>7579_gtw.Geotiff.tif</title>

            <!-- Leaflet 1.9.4 -->
            <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

            <style>
                body { margin:0; padding:0; }
                body, table, tr, td, th, div, h1, h2, input { font-family: "Calibri", "Trebuchet MS", "Ubuntu", Serif; font-size: 11pt; }
                #map { height: 700px; width: 100%; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
                .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
                .ctl {
                    padding: 2px 10px 2px 10px;
                    background: white;
                    background: rgba(255,255,255,0.9);
                    box-shadow: 0 0 15px rgba(0,0,0,0.2);
                    border-radius: 5px;
                    text-align: right;
                }
                .title {
                    font-size: 18pt;
                    font-weight: bold;
                }
                .guide-box {
                    background-color: #dbeafe;
                    color: #1e3a8a;
                    padding: 1rem;
                    border-radius: 0.375rem;
                    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
                    margin-bottom: 1.5rem;
                    font-size: 0.875rem;
                    line-height: 1.5rem;
                }
                .guide-box a { color: #1d4ed8; text-decoration: underline; font-weight: 500; }
                
                @keyframes pulse {
                    0%, 100% { opacity: 1; }
                    50% { opacity: .5; }
                }
                .animate-pulse {
                    animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
                }

            </style>

        </head>
        <div class="container">
            <!-- Guide utilisateur (Comme dans votre React script) -->
            <div class="guide-box">
                <p><strong>👉 Étape 1 :</strong> Charger les données météo :</p>
                <a href="https://data-real-time-2.onrender.com/donnees?limit=50" target="_blank" rel="noopener noreferrer">
                    🔗 API météo
                </a>
                <p style="margin-top: 0.75rem;"><strong>👉 Étape 2 :</strong> Visualiser sur la carte :</p>
                <a href="https://padgrah.onrender.com/" target="_blank" rel="noopener noreferrer" style="color: #15803d;">
                    🗺️ Dashboard
                </a>
            </div>

            <div id="status-msg" style="padding: 10px; margin-bottom: 20px; background: #fff5f5; border: 1px solid #feb2b2; display: none; color: #c53030; border-radius: 5px;"></div>
            <div id="map"></div>
        </div>

        <script>

        const statusMsg = document.getElementById('status-msg');
        function showStatus(text, isError = true) {
            statusMsg.style.display = 'block';
            statusMsg.style.backgroundColor = isError ? '#fff5f5' : '#f0fff4';
            statusMsg.style.borderColor = isError ? '#feb2b2' : '#9ae6b4';
            statusMsg.style.color = isError ? '#c53030' : '#276749';
            statusMsg.innerText = text;
        }

        /* **** Leaflet **** */

        // Base layers
        var osm = L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {attribution: '&copy; OpenStreetMap', minZoom: 0, maxZoom: 18});
        var cartodb = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {attribution: 'CartoDB', minZoom: 0, maxZoom: 18});

        // Overlay layers (TMS)
        var lyr = L.tileLayer('./{z}/{x}/{y}.png', {tms: 0, opacity: 0.7, attribution: "Local GeoTiff", minZoom: 0, maxZoom: 14});

        // Map
        var map = L.map('map', {
            center: [4.05, 9.68],
            zoom: 10,
            minZoom: 0,
            maxZoom: 18,
            layers: [osm]
        });

        var basemaps = {"OpenStreetMap": osm, "CartoDB Positron": cartodb}
        var overlaymaps = {"Ma Carte (GeoTiff)": lyr}

        L.control.layers(basemaps, overlaymaps, {collapsed: false}).addTo(map);
        lyr.addTo(map);

        // Fit to overlay bounds
        map.fitBounds([[3.5, 9.8], [4.2, 9.3]]);

        /* **** Météo Data Logic **** */

        const cleanValue = (v) => {
            if (v === null || v === undefined || v === "NaN" || (typeof v === "number" && isNaN(v))) return "—";
            return v;
        };

        const getWindDirectionText = (deg) => {
            if (deg === undefined || deg === null || isNaN(deg)) return "Inconnu";
            const directions = ["N","NE","E","SE","S","SW","W","NW"];
            const index = Math.round(deg / 45) % 8;
            return directions[index];
        };

        const getWindIcon = (angle, speed) => {
            angle = parseFloat(angle) || 0;
            speed = parseFloat(speed) || 0;
            const rotation = `rotate(${angle - 180}deg)`;
            let color = "#3b82f6";
            if (speed >= 3 && speed <= 7) color = "#f97316";
            else if (speed > 7) color = "#8B0000";

            const animatedClass = speed > 7 ? "animate-pulse" : "";

            return L.divIcon({
                className: "custom-icon",
                html: `
                <div style="transform:${rotation}; width:36px; height:36px;" class="${animatedClass}">
                    <svg width="36" height="36" viewBox="0 0 24 24">
                        <path d="M12 2L15 8H9L12 2Z" fill="${color}" />
                        <line x1="12" y1="8" x2="12" y2="22" stroke="${color}" stroke-width="2"/>
                    </svg>
                </div>
                `,
                iconSize: [36,36],
                iconAnchor: [18,18],
            });
        };

        async function fetchWeatherData() {
            try {
                showStatus("Chargement des données météo...", false);
                const response = await fetch("https://data-real-time-2.onrender.com/donnees?limit=50");
                if (!response.ok) throw new Error("Erreur réseau: " + response.status);
                
                const data = await response.json();
                console.log("Données reçues:", data);
                
                if (!data || data.length === 0) {
                    showStatus("Aucune donnée reçue de l'API.");
                    return;
                }

                // Latest per station
                const stations = {};
                data.forEach(record => {
                    if (!record.Station) return;
                    const date = new Date(record.DateTime);
                    if (!stations[record.Station] || new Date(stations[record.Station].DateTime) < date) {
                        stations[record.Station] = record;
                    }
                });

                const markersGroup = L.featureGroup();
                let markerCount = 0;

                Object.values(stations).forEach(record => {
                    const lat = parseFloat(record.Latitude);
                    const lon = parseFloat(record.Longitude);
                    if (isNaN(lat) || isNaN(lon)) {
                        console.warn("Coordonnées invalides pour la station:", record.Station);
                        return;
                    }

                    const windDir = parseFloat(record["WIND DIR"]);
                    const windSpeed = parseFloat(record["WIND SPEED"]);
                    const pressure = cleanValue(record["AIR PRESSURE"]);
                    const surge = record["SURGE"];

                    const popupContent = `
                        <div style="width:250px; font-size:13px; font-family: sans-serif;">
                            <h4 style="margin:0 0 10px 0; color:#007bff;">${record.Station}</h4>
                            <p style="margin:4px 0;"><b>📅 Date :</b> ${new Date(record.DateTime).toLocaleString('fr-FR')}</p>
                            <p style="margin:4px 0;"><b>🌡️ Température :</b> ${cleanValue(record["AIR TEMPERATURE"])} °C</p>
                            <p style="margin:4px 0;"><b>💨 Vent :</b> ${windSpeed} m/s – ${windDir}° (${getWindDirectionText(windDir)})</p>
                            <p style="margin:4px 0;"><b>💧 Humidité :</b> ${cleanValue(record["HUMIDITY"])} %</p>
                            <p style="margin:4px 0;"><b>🧭 Pression :</b> ${pressure} hPa</p>
                            ${record["TIDE HEIGHT"] ? `<p style="margin:4px 0;"><b>🌊 Marée :</b> ${record["TIDE HEIGHT"]} m</p>` : ""}
                            ${surge ? `<p style="margin:4px 0; color:#dc2626;"><b>⚠️ Surcote :</b> ${surge} m</p>` : ""}
                        </div>
                    `;

                    L.marker([lat, lon], { icon: getWindIcon(windDir, windSpeed) })
                        .bindPopup(popupContent)
                        .bindTooltip(`<b>${record.Station}</b>`, { permanent: true, direction: 'top', offset: [0, -10] })
                        .addTo(markersGroup);
                    
                    markerCount++;
                });

                markersGroup.addTo(map);
                showStatus(markerCount + " station(s) chargée(s) avec succès.", false);
                
                if (markerCount > 0) {
                    // Zoomer pour voir toutes les stations
                    map.fitBounds(markersGroup.getBounds().pad(0.2));
                }

            } catch (error) {
                console.error("Erreur:", error);
                showStatus("Impossible de charger les stations : " + error.message + ". (Si vous ouvrez le fichier directement, le navigateur peut bloquer l'accès à l'API pour des raisons de sécurité).");
            }
        }

        fetchWeatherData();


        </script>

        </body>
        </html>
